name: denylist

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    name: Contamination scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run contamination scanner on working tree
        run: bash bin/check-contamination.sh

      - name: Maintainer-token sweep (excludes .github/.denylist-maintainer)
        shell: bash
        run: |
          set -u
          if grep -rE 'MAINTAINER_COMPANY_A|MAINTAINER_COMPANY_B|MAINTAINER_PARTNER_ID|MAINTAINER_OPERATOR|MAINTAINER_NUMERIC|C[0-9]{2,3}|G[0-9]{2,3}|security find-generic-password' . \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude=.denylist-maintainer; then
            echo "::error::Maintainer-only token leaked into public tree"
            exit 1
          fi
          echo "Maintainer-token sweep clean"
